version: '3.9'

# ============================================================
# SAGA Platform — Docker Compose Unificado
# Portal: http://localhost:3000
# Shadow AI Scanner: http://localhost:5173
# AI-DSRM Dashboard: http://localhost:3001
# IA-Hardening-Guide Dashboard: http://localhost:3002
# ============================================================

networks:
  saga-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  scanner_workspace:
    driver: local

services:

  # ========== SAGA PORTAL ==========
  saga-portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: saga-portal
    restart: unless-stopped
    environment:
      VITE_SHADOW_AI_URL: http://localhost:5173
      VITE_DSRM_URL: http://localhost:3001
    ports:
      - "3000:3000"
    networks:
      - saga-net

  # ========== SHADOW AI MODULE ==========
  shadow-ai-backend:
    build:
      context: ../Get-Githubreposoitory-IA
      dockerfile: Dockerfile
    container_name: shadow-ai-backend
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - TARGET_ORGANIZATION=${TARGET_ORGANIZATION:-my_org}
      - OPA_URL_BASE=http://shadow-ai-opa:8181/v1/data/exceptions
      - OPA_URL=http://shadow-ai-opa:8181/v1/data/saga/governance/allow
    volumes:
      - ../Get-Githubreposoitory-IA:/app
    command: uvicorn api.webhook_server:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - shadow-ai-opa
    networks:
      - saga-net

  shadow-ai-opa:
    image: openpolicyagent/opa:latest-debug
    container_name: shadow-ai-opa
    restart: unless-stopped
    ports:
      - "8181:8181"
    volumes:
      - ../Get-Githubreposoitory-IA/opa:/policy
    command: [ "run", "--server", "--addr=0.0.0.0:8181", "--log-level=debug", "/policy/policy.rego" ]
    networks:
      - saga-net

  shadow-ai-frontend:
    build:
      context: ../Get-Githubreposoitory-IA/dashboard-ui
      dockerfile: Dockerfile
    container_name: shadow-ai-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ../Get-Githubreposoitory-IA/dashboard-ui:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - shadow-ai-backend
    networks:
      - saga-net

  # ========== AI-DSRM MODULE ==========
  dsrm-postgres:
    image: postgres:16-alpine
    container_name: dsrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dsrm_scanner
      POSTGRES_USER: dsrm
      POSTGRES_PASSWORD: ${DSRM_DB_PASSWORD:-dsrm_dev_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../IA-Security-scan-github/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../IA-Security-scan-github/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dsrm -d dsrm_scanner" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saga-net

  dsrm-minio:
    image: minio/minio:latest
    container_name: dsrm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - saga-net

  dsrm-minio-init:
    image: minio/mc:latest
    container_name: dsrm-minio-init
    depends_on:
      dsrm-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://dsrm-minio:9000 minioadmin minioadmin; /usr/bin/mc mb myminio/dsrm-reports --ignore-existing; /usr/bin/mc mb myminio/dsrm-sarif --ignore-existing; /usr/bin/mc anonymous set download myminio/dsrm-reports; echo 'MinIO inicializado com sucesso'; "
    networks:
      - saga-net

  dsrm-opa:
    image: openpolicyagent/opa:latest
    container_name: dsrm-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - ../IA-Security-scan-github/policy-engine/policies/dsrm.rego:/policies/dsrm.rego:ro
    ports:
      - "8182:8181"
    healthcheck:
      test: [ "CMD", "/opa", "eval", "1+1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - saga-net

  dsrm-backend:
    build:
      context: ../IA-Security-scan-github/backend
      dockerfile: Dockerfile
      target: development
    container_name: dsrm-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DEMO_MODE: "true"
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://dsrm:${DSRM_DB_PASSWORD:-dsrm_dev_password_2024}@dsrm-postgres:5432/dsrm_scanner
      S3_ENDPOINT: http://dsrm-minio:9000
      S3_BUCKET: dsrm-reports
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      OPA_URL: http://dsrm-opa:8181
      FRONTEND_URL: http://localhost:3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-nao-usar-em-producao-2024}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-12345}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-demo-client-id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-demo-client-secret}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-demo-webhook-secret}
    volumes:
      - ../IA-Security-scan-github/backend/src:/app/src:ro
      - ../IA-Security-scan-github/mock-data:/app/mock-data:ro
      - scanner_workspace:/tmp/scanner-workspace
    ports:
      - "4000:4000"
    depends_on:
      dsrm-postgres:
        condition: service_healthy
      dsrm-minio:
        condition: service_healthy
      dsrm-opa:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - saga-net

  dsrm-normalizer:
    build:
      context: ../IA-Security-scan-github/normalizer
      dockerfile: Dockerfile
    container_name: dsrm-normalizer
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://dsrm:${DSRM_DB_PASSWORD:-dsrm_dev_password_2024}@dsrm-postgres:5432/dsrm_scanner
      S3_ENDPOINT: http://dsrm-minio:9000
      S3_BUCKET: dsrm-sarif
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      OPA_URL: http://dsrm-opa:8181
    volumes:
      - scanner_workspace:/tmp/scanner-workspace
      - ../IA-Security-scan-github/mock-data:/app/mock-data:ro
    depends_on:
      dsrm-postgres:
        condition: service_healthy
    networks:
      - saga-net

  dsrm-frontend:
    build:
      context: ../IA-Security-scan-github/frontend
      dockerfile: Dockerfile
      target: development
    container_name: dsrm-frontend
    restart: unless-stopped
    environment:
      VITE_DEMO_MODE: "true"
    volumes:
      - ../IA-Security-scan-github/frontend/src:/app/src:ro
    ports:
      - "3001:3000"
    depends_on:
      - dsrm-backend
    networks:
      - saga-net

  dsrm-mock-scanner:
    build:
      context: ../IA-Security-scan-github/scanners/mock
      dockerfile: Dockerfile
    container_name: dsrm-mock-scanner
    restart: "no"
    environment:
      S3_ENDPOINT: http://dsrm-minio:9000
      S3_BUCKET: dsrm-sarif
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    volumes:
      - ../IA-Security-scan-github/mock-data:/mock-data:ro
      - scanner_workspace:/tmp/scanner-workspace
    depends_on:
      dsrm-minio-init:
        condition: service_completed_successfully
    networks:
      - saga-net

  # ========== IA-HARDENING-GUIDE MODULE ==========
  hardening-backend:
    build:
      context: ../IA-Hardening-Guide/backend
      dockerfile: Dockerfile
      target: development
    container_name: hardening-backend
    restart: unless-stopped
    environment:
      PORT: 6000
      HOST: 0.0.0.0
    ports:
      - "6000:6000"
    networks:
      - saga-net

  hardening-frontend:
    build:
      context: ../IA-Hardening-Guide/frontend
      dockerfile: Dockerfile
      target: development
    container_name: hardening-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:6000
    volumes:
      - ../IA-Hardening-Guide/frontend/src:/app/src:ro
    ports:
      - "3002:3002"
    depends_on:
      - hardening-backend
    networks:
      - saga-net

  hardening-opa:
    image: openpolicyagent/opa:latest
    container_name: hardening-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8183"
      - "--log-format=json"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - ../IA-Hardening-Guide/policy-engine/policies:/policies:ro
    ports:
      - "8183:8183"
    healthcheck:
      test: [ "CMD", "/opa", "eval", "1+1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - saga-net
